name: Schema Proposal
description: Propose a new field or schema change before implementation.
title: 'schema: '
labels:
  - schema-proposal
body:
  - type: markdown
    attributes:
      value: |
        Schema changes require maintainer approval before implementation.

        Do not open a data PR for a new field until the proposal has been accepted.

        For broader contribution ideas or new dataset topics, contact data@opensyria.org before starting work.
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What field or schema change are you proposing?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Who needs this and why?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Source Availability
      description: What reusable sources support this field consistently?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Rules
      description: How should values be typed, constrained, normalized, and checked?
    validations:
      required: true
  - type: textarea
    id: migration
    attributes:
      label: Migration Plan
      description: Should existing records be backfilled? Is the field required or optional?
    validations:
      required: true
  - type: textarea
    id: api-impact
    attributes:
      label: API and Release Impact
      description: Should generated artifacts or `datasets-api` expose this field?
  - type: textarea
    id: safety
    attributes:
      label: Safety and Licensing
      description: Explain why this field is safe and legal to publish.
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I understand this is a proposal and not approval to implement the field.
          required: true
        - label: The proposal does not include private, personal, security, military, checkpoint, surveillance, or non-public data.
          required: true
