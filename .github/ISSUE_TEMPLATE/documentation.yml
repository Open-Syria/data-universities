name: Documentation Correction
description: Report a typo, stale command, broken link, or unclear documentation.
title: 'docs: '
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which file or section needs correction?
      placeholder: README.md, CONTRIBUTING.md, docs/DATA_SCHEMA.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is wrong, stale, confusing, or missing?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested Correction
      description: Optional replacement text or suggested direction.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This is about repository documentation, not a data record correction.
          required: true
