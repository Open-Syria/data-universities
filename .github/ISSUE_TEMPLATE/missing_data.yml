name: Missing Data
description: Suggest a missing university record.
title: 'missing: '
labels:
  - missing-data
body:
  - type: markdown
    attributes:
      value: |
        Use this form for missing university records within the approved universities scope.

        New dataset topics or new fields should use the schema proposal form instead.
        For broader contribution ideas, contact data@opensyria.org before starting work.
  - type: dropdown
    id: record-type
    attributes:
      label: Record Type
      options:
        - university
    validations:
      required: true
  - type: input
    id: name-en
    attributes:
      label: English Name
      description: English or transliterated name of the missing record.
    validations:
      required: true
  - type: input
    id: name-ar
    attributes:
      label: Arabic Name
      description: Arabic name if known.
  - type: textarea
    id: parent
    attributes:
      label: Location
      description: Governorate, city, or public campus address if known.
  - type: input
    id: coverage-target
    attributes:
      label: Coverage Report Target
      description: Optional field or record ID from the data report.
      placeholder: universities.website or sy-damascus-university
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Add URLs or citations that support the missing record and mention reuse/license terms when known.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add aliases, coordinates, source conflicts, or uncertainty if useful.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This record is within the approved universities scope.
          required: true
        - label: I included reviewable sources for this missing record.
          required: true
        - label: I did not use Google Maps, commercial map data, proprietary directories, or unclear-license sources.
          required: true
        - label: I did not use AI output as a source.
          required: true
        - label: I did not include private, personal, security, military, checkpoint, surveillance, or non-public data.
          required: true
